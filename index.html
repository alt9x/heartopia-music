<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartopia 唱片展示</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    overflow:hidden;
}

/* 🌈 背景漸層 */
body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background: linear-gradient(120deg,#0f172a,#1e293b,#111827,#1e3a8a);
    background-size:400% 400%;
    animation: bgMove 12s ease infinite;
    z-index:-3;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* ✨ 星空 */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-2;
}

.particle{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation: floatUp linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);opacity:0}
    20%{opacity:1}
    100%{transform:translateY(-10vh);opacity:0}
}

/* 🖱️ 滑鼠光點 */
#cursorGlow{
    position:fixed;
    width:25px;
    height:25px;
    background:#5865F2;
    border-radius:50%;
    pointer-events:none;
    filter:blur(8px);
    transform:translate(-50%,-50%);
    z-index:999;
}

/* 內容 */
body > *:not(#particles):not(#cursorGlow){
    position:relative;
    z-index:1;
}

/* 標題 */
header{
    text-align:center;
    padding:60px 20px 20px;
}

h1{
    font-size:40px;
}

.subtitle{
    color:#94a3b8;
}

/* 卡片 */
.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #5865F2;
}

/* 🎧 唱片旋轉 */
.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    transition:0.5s;
}

.card:hover img{
    animation:spin 2s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.card h3{
    margin:10px;
}

.card p{
    margin:0 10px 15px;
    color:#94a3b8;
}

/* 🔥 放大預覽 */
#modal{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

#modal img{
    width:300px;
    height:300px;
    border-radius:12px;
}

/* footer */
footer{
    text-align:center;
    margin-top:40px;
    color:#64748b;
}
</style>
</head>

<body>

<div id="particles"></div>
<div id="cursorGlow"></div>

<header>
    <h1>Heartopia 唱片展示</h1>
    <p class="subtitle">玩家自製唱片展示 · Alt_9x</p>
</header>

<div class="container">

<div class="grid">

    <div class="card" onclick="openModal('image.png'); playSound()">
        <img src="image.png">
        <h3>Jane Doe</h3>
        <p>Heartopia Record</p>
    </div>

</div>

</div>

<!-- 放大視窗 -->
<div id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<footer>
Heartopia 唱片展示
</footer>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>

/* 星空 */
const p = document.getElementById("particles");
for(let i=0;i<80;i++){
    let d=document.createElement("div");
    d.className="particle";
    d.style.left=Math.random()*100+"vw";
    d.style.animationDuration=(3+Math.random()*5)+"s";
    d.style.animationDelay=Math.random()*5+"s";
    p.appendChild(d);
}

/* 滑鼠光點 */
const glow=document.getElementById("cursorGlow");
document.addEventListener("mousemove",(e)=>{
    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";
});

/* 點擊放大 */
function openModal(img){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalImg").src=img;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* 音效 */
function playSound(){
    document.getElementById("sound").play();
}

</script>

</body>
</html>
