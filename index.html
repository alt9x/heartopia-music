<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartopia 唱片展示</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    overflow:hidden;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background: linear-gradient(120deg,#0f172a,#1e293b,#111827,#1e3a8a);
    background-size:400% 400%;
    animation: bgMove 12s ease infinite;
    z-index:-3;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* 星空 */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-2;
    pointer-events:none;
}

.particle{
    position:absolute;
    width:3px;
    height:3px;
    background:rgba(255,255,255,0.7);
    border-radius:50%;
    animation: floatUp linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);opacity:0;}
    20%{opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* 滑鼠光點 */
#cursorGlow{
    position:fixed;
    width:16px;
    height:16px;
    background:rgba(88,101,242,0.8);
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    filter:blur(6px);
    z-index:999;
}

/* header */
header{
    text-align:center;
    padding:60px 20px 30px;
}

h1{
    font-size:38px;
    margin-bottom:10px;
}

.subtitle{
    color:#94a3b8;
}

/* container */
.container{
    max-width:900px;
    margin:auto;
    padding:15px;
}

/* ⭐ GRID（縮小間距 + 更密） */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap:10px;
    margin-top:20px;
}

/* 卡片（更小） */
.card{
    background:#1e293b;
    border-radius:12px;
    padding:6px;
    text-align:center;
    width:100%;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
    animation: cardFloat 6s ease-in-out infinite;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px) scale(1.03);
    box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

@keyframes cardFloat{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-3px);}
    100%{transform:translateY(0px);}
}

/* 黑膠（縮小） */
.vinyl-img{
    width:105px;
    height:105px;
    object-fit:cover;
    border-radius:50%;
    display:block;
    margin:5px auto;

    box-shadow:
        0 0 10px rgba(0,0,0,0.7),
        0 0 14px rgba(88,101,242,0.25);

    animation: spin 6s linear infinite;
}

.card:hover .vinyl-img{
    animation: spin 2.2s linear infinite;
    box-shadow:
        0 0 25px rgba(88,101,242,0.6),
        0 0 45px rgba(88,101,242,0.3);
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* 文字（縮小） */
.card h3{
    margin:5px 0 2px 0;
    font-size:12px;
}

.card p{
    margin:0;
    color:#94a3b8;
    font-size:10px;
}

/* 按鈕 */
.button{
    display:inline-block;
    margin-top:30px;
    padding:12px 24px;
    background:#5865F2;
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-size:16px;
}

.button:hover{
    background:#4752c4;
    transform:scale(1.05);
}

/* 標題 */
.section-title{
    text-align:center;
    font-size:22px;
    margin-top:30px;
}

/* footer */
footer{
    text-align:center;
    margin-top:50px;
    padding:15px;
    color:#64748b;
    font-size:13px;
}
</style>
</head>

<body>

<div id="particles"></div>
<div id="cursorGlow"></div>

<header>
<h1>Heartopia 唱片展示</h1>
<p class="subtitle">玩家自製唱片展示 · 免費分享 · 社群交流</p>
</header>

<div class="container">

<div class="section-title">🎵 作品分享</div>

<div class="grid" id="songGrid"></div>

<div style="text-align:center;">
<a class="button" href="https://discord.gg/ceEKXFwq2m" target="_blank">
🎵 加入 Discord 許願唱片
</a>
</div>

</div>

<footer>
Heartopia 唱片展示
</footer>

<script>

/* 星星 */
const p = document.getElementById("particles");

for(let i=0;i<80;i++){
let dot = document.createElement("div");
dot.className="particle";

dot.style.left = Math.random()*100+"vw";
dot.style.animationDuration = (3+Math.random()*5)+"s";
dot.style.animationDelay = Math.random()*5+"s";

p.appendChild(dot);
}

/* 滑鼠光 */
const glow = document.getElementById("cursorGlow");

document.addEventListener("mousemove",(e)=>{
glow.style.left = e.clientX+"px";
glow.style.top = e.clientY+"px";
});

/* 歌曲資料 */
const songs = [
  {img:"image.png", title:"JANE DOE", artist:"米津玄師 x 宇多田ヒカル"},
  {img:"image3.png", title:"IRIS OUT", artist:"米津玄師"}
];

/* 自動生成 */
const grid = document.getElementById("songGrid");

songs.forEach(song=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="${song.img}" class="vinyl-img">
        <h3>${song.title}</h3>
        <p>${song.artist}</p>
    `;

    grid.appendChild(card);
});

</script>

</body>
</html>
