<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartopia 唱片展示</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    overflow:hidden;
}

/* 🌈 背景漸層 */
body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background: linear-gradient(120deg,#0f172a,#1e293b,#111827,#1e3a8a);
    background-size:400% 400%;
    animation: bgMove 12s ease infinite;
    z-index:-3;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* 內容 */
body > *{
    position:relative;
    z-index:1;
}

/* header */
header{
    text-align:center;
    padding:70px 20px 20px;
}

h1{
    font-size:42px;
    margin-bottom:10px;
}

.subtitle{
    color:#94a3b8;
}

/* 🎧 黑膠卡片 */
.vinyl-card{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin-top:40px;
}

/* 黑膠 */
.vinyl{
    width:220px;
    height:220px;
    border-radius:50%;
    background: radial-gradient(circle at center,
        #111 0%,
        #000 45%,
        #222 60%,
        #000 100%);
    box-shadow:0 0 25px rgba(0,0,0,0.8);
    position:relative;
    animation:spin 6s linear infinite;
}

/* 中心點 */
.vinyl::after{
    content:"";
    position:absolute;
    width:60px;
    height:60px;
    background:#5865F2;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* 旋轉 */
@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* 歌名 */
.song{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

/* 作者 */
.author{
    color:#94a3b8;
    margin-top:5px;
}

/* button */
.button{
    display:inline-block;
    margin-top:40px;
    padding:15px 30px;
    background:#5865F2;
    color:white;
    border-radius:12px;
    text-decoration:none;
}
.button:hover{
    background:#4752c4;
}
</style>
</head>

<body>

<header>
    <h1>Heartopia 唱片展示</h1>
    <p class="subtitle">玩家自製唱片展示 · 免費分享</p>
</header>

<div class="vinyl-card">

    <div class="vinyl"></div>

    <div class="song">JANE DOE</div>
    <div class="author">米津玄師 × 宇多田ヒカル</div>

</div>

<div style="text-align:center;">
    <a class="button" href="https://discord.gg/FNrNgZyvrt" target="_blank">
        🎵 加入 Discord
    </a>
</div>

</body>
</html>
