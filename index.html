<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartopia 唱片展示</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    overflow-x:hidden;
}

/* 背景動畫 */
body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background: linear-gradient(120deg,#0f172a,#1e293b,#111827,#1e3a8a);
    background-size:400% 400%;
    animation: bgMove 12s ease infinite;
    z-index:-3;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* 星空 */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-2;
    pointer-events:none;
}

.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:rgba(255,255,255,0.8);
    border-radius:50%;
    animation: floatUp linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);opacity:0;}
    20%{opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* 滑鼠光點 */
#cursorGlow{
    position:fixed;
    width:20px;
    height:20px;
    background:rgba(88,101,242,0.8);
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    filter:blur(6px);
    z-index:999;
}

/* header */
header{
    text-align:center;
    padding:60px 20px 30px;
}

h1{ font-size:42px; margin-bottom:10px; }
.subtitle{ color:#94a3b8; }

/* container */
.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

/* grid */
.grid{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:28px;
    margin-top:30px;
    padding:20px;
    box-sizing:border-box;
}

/* 卡片 */
.card{
    background:#1e293b;
    border-radius:16px;
    padding:14px;
    text-align:center;
    width:100%;
    box-sizing:border-box;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    transition:0.3s;
    position:relative;
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* ⭐⭐⭐ 黑膠核心（重做） */
.vinyl{
    width:150px;
    height:150px;
    margin:10px auto;
    border-radius:50%;
    position:relative;
    overflow:hidden;

    /* 黑膠質感 */
    background: radial-gradient(circle at center,
        #111 0%,
        #000 60%,
        #111 100%);

    box-shadow:
        0 0 12px rgba(0,0,0,0.8),
        0 0 18px rgba(88,101,242,0.25);

    animation: spin 8s linear infinite;
}

/* 圖片填滿 */
.vinyl img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    top:0;
    left:0;
    opacity:0.9;
}

/* 中心洞 */
.vinyl::after{
    content:"";
    position:absolute;
    width:28px;
    height:28px;
    background:#0f172a;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    box-shadow: inset 0 0 8px rgba(255,255,255,0.1);
}

/* 旋轉 */
@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* 文字 */
.card h3{
    margin:12px 0 6px 0;
    font-size:13px;
}

.card p{
    margin:0 0 12px 0;
    color:#94a3b8;
    font-size:11px;
}

/* button */
.button{
    display:inline-block;
    margin-top:40px;
    padding:15px 30px;
    background:#5865F2;
    color:white;
    border-radius:12px;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}

.button:hover{
    background:#4752c4;
    transform:scale(1.05);
}

.section-title{
    text-align:center;
    font-size:24px;
    margin-top:40px;
}

footer{
    text-align:center;
    margin-top:60px;
    padding:20px;
    color:#64748b;
    font-size:14px;
}

/* 📱手機 */
@media (max-width:768px){
.grid{
    grid-template-columns: repeat(2, 1fr);
    gap:16px;
}

h1{ font-size:28px; }

.vinyl{
    width:100px;
    height:100px;
}
}

</style>
</head>

<body>

<div id="particles"></div>
<div id="cursorGlow"></div>

<header>
<h1>Heartopia 唱片展示</h1>
<p class="subtitle">玩家自製唱片展示 · 免費分享 · 社群交流</p>
</header>

<div class="container">

<div class="section-title">🎵 作品分享</div>

<div class="grid">

<div class="card">
<div class="vinyl">
    <img src="image.png">
</div>
<h3>JANE DOE</h3>
<p>米津玄師 x 宇多田ヒカル</p>
</div>

<div class="card">
<div class="vinyl">
    <img src="image3.png">
</div>
<h3>IRIS OUT</h3>
<p>米津玄師</p>
</div>

<div class="card">
<div class="vinyl">
    <img src="skytree.png">
</div>
<h3>天空之城</h3>
<p>久石讓</p>
</div>

<div class="card">
<div class="vinyl">
    <img src="iu.png">
</div>
<h3>Celebrity</h3>
<p>IU</p>
</div>

</div>

<div style="text-align:center;">
<a class="button" href="https://discord.gg/ceEKXFwq2m" target="_blank">
🎵 加入 Discord 許願唱片
</a>
</div>

</div>

<footer>
Heartopia 唱片展示
</footer>

<script>
const p = document.getElementById("particles");

for(let i=0;i<60;i++){
let dot = document.createElement("div");
dot.className="particle";
dot.style.left = Math.random()*100+"vw";
dot.style.animationDuration = (3+Math.random()*5)+"s";
dot.style.animationDelay = Math.random()*5+"s";
p.appendChild(dot);
}

const glow = document.getElementById("cursorGlow");

document.addEventListener("mousemove",(e)=>{
glow.style.left = e.clientX+"px";
glow.style.top = e.clientY+"px";
});

if(window.innerWidth < 768){
document.getElementById("cursorGlow").style.display="none";
}
</script>

</body>
</html>
