<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartopia 唱片展示</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    overflow:hidden;
}

/* 🌈 背景漸層慢慢變色 */
body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background: linear-gradient(120deg,#0f172a,#1e293b,#111827,#1e3a8a);
    background-size:400% 400%;
    animation: bgMove 12s ease infinite;
    z-index:-3;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* ✨ 星空粒子（密度加強版） */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    top:0;
    left:0;
    z-index: -2;
    pointer-events:none;
}

.particle {
    position:absolute;
    width:4px;
    height:4px;
    background: rgba(255,255,255,0.8);
    border-radius:50%;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh); opacity:0;}
    20%{opacity:1;}
    100% {transform: translateY(-10vh); opacity:0;}
}

/* 🖱️ 滑鼠光點 */
#cursorGlow{
    position:fixed;
    width:20px;
    height:20px;
    background:rgba(88,101,242,0.8);
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    filter:blur(6px);
    z-index:999;
}

/* 內容 */
body > *:not(#particles):not(#cursorGlow){
    position:relative;
    z-index:1;
}

/* header */
header{
    text-align:center;
    padding:70px 20px 40px;
}

h1{
    font-size:42px;
    margin-bottom:10px;
}

.subtitle{
    color:#94a3b8;
}

/* container */
.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

/* 🎴 自動排版卡片（升級10~20張用） */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-top:30px;
}

/* 卡片 */
.card{
    background:#1e293b;
    border-radius:16px;
    overflow:hidden;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

.card h3{
    margin:10px;
}

.card p{
    margin:0 10px 15px;
    color:#94a3b8;
}

/* 按鈕 */
.button{
    display:inline-block;
    margin-top:40px;
    padding:15px 30px;
    background:#5865F2;
    color:white;
    border-radius:12px;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}

.button:hover{
    background:#4752c4;
    transform:scale(1.05);
}

/* 發光 */
.glow{
    box-shadow:0 0 20px #5865F2;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px #5865F2;}
    50%{box-shadow:0 0 30px #5865F2;}
    100%{box-shadow:0 0 10px #5865F2;}
}

/* 標題 */
.section-title{
    text-align:center;
    font-size:24px;
    margin-top:40px;
}

/* footer */
footer{
    text-align:center;
    margin-top:60px;
    padding:20px;
    color:#64748b;
    font-size:14px;
}
</style>
</head>

<body>

<div id="particles"></div>
<div id="cursorGlow"></div>

<header>
    <h1>Heartopia 唱片展示</h1>
    <p class="subtitle">玩家自製唱片展示 · 免費分享 · 社群交流</p>
</header>

<div class="container">

    <div class="section-title">🎵 我的作品</div>

    <div class="grid">

        <!-- 可以無限加卡片（10~20張都OK） -->
        <div class="card">
            <img src="record1.jpg">
            <h3>APT</h3>
            <p>Alt_9x</p>
        </div>

        <div class="card">
            <img src="record2.jpg">
            <h3>漩渦人生</h3>
            <p>Alt_9x</p>
        </div>

    </div>

    <div style="text-align:center;">
        <a class="button glow" href="https://discord.gg/FNrNgZyvrt" target="_blank">
            🎵 加入 Discord 許願唱片
        </a>
    </div>

</div>

<footer>
Heartopia 唱片展示
</footer>

<script>

/* ✨ 星空密度加強 */
const p = document.getElementById("particles");

for(let i=0;i<80;i++){
    let dot = document.createElement("div");
    dot.className="particle";

    dot.style.left = Math.random()*100+"vw";
    dot.style.animationDuration = (3+Math.random()*5)+"s";
    dot.style.animationDelay = Math.random()*5+"s";

    p.appendChild(dot);
}

/* 🖱️ 滑鼠跟隨光點 */
const glow = document.getElementById("cursorGlow");

document.addEventListener("mousemove",(e)=>{
    glow.style.left = e.clientX+"px";
    glow.style.top = e.clientY+"px";
});

</script>

</body>
</html>
