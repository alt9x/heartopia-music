<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartopia Music</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b1220;
    color:white;
    overflow-x:hidden;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top,#1e3a8a33,transparent 60%),
                radial-gradient(circle at bottom,#9333ea22,transparent 60%);
    z-index:-3;
}

/* 星空 */
#particles{
    position:fixed;
    inset:0;
    z-index:-2;
    pointer-events:none;
}

.particle{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    opacity:0.6;
    border-radius:50%;
    animation: floatUp linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);opacity:0;}
    20%{opacity:0.8;}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* header */
header{
    text-align:center;
    padding:90px 20px 40px;
}

h1{
    font-size:48px;
    margin:0;
}

.subtitle{
    color:#94a3b8;
    margin-top:10px;
}

/* section */
.section{
    max-width:1000px;
    margin:80px auto;
    padding:0 20px;
}

/* title */
.section-title{
    font-size:22px;
    margin-bottom:30px;
    color:#cbd5e1;
}

/* 卡片（動畫核心） */
.card{
    display:flex;
    align-items:center;
    gap:20px;
    padding:20px;
    margin-bottom:20px;

    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;

    backdrop-filter: blur(12px);

    opacity:0;
    transform:translateY(40px);
    transition:0.8s;
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.card:hover{
    transform:translateY(-5px);
}

/* 黑膠 */
.vinyl{
    width:90px;
    height:90px;
    border-radius:50%;
    overflow:hidden;
    background:#000;
    position:relative;
    flex-shrink:0;

    box-shadow: inset 0 0 18px rgba(0,0,0,0.95);
}

.vinyl img{
    width:100%;
    height:100%;
    object-fit:cover;
    animation: spin 8s linear infinite;
}

.vinyl::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;

    background:
        radial-gradient(circle at center,
            rgba(0,0,0,0.1),
            rgba(0,0,0,0.7)
        ),
        repeating-radial-gradient(
            circle,
            rgba(255,255,255,0.05) 0px,
            transparent 3px
        );

    pointer-events:none;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* text */
.card h3{
    margin:0;
    font-size:16px;
}

.card p{
    margin:5px 0 0;
    font-size:12px;
    color:#94a3b8;
}

/* button */
.button{
    display:inline-block;
    margin-top:40px;
    padding:14px 26px;
    background:rgba(96,165,250,0.15);
    border:1px solid rgba(96,165,250,0.4);
    color:white;
    border-radius:12px;
    text-decoration:none;
}

.button:hover{
    background:rgba(96,165,250,0.25);
}

/* footer */
footer{
    text-align:center;
    margin:80px 0 40px;
    color:#64748b;
}
</style>
</head>

<body>

<div id="particles"></div>

<header>
<h1>Heartopia Music</h1>
<p class="subtitle">作品展示</p>
</header>

<div class="section">
<div class="section-title">🎵 作品列表</div>

<div class="card">
<div class="vinyl"><img src="500x500.jpg"></div>
<div>
<h3>JANE DOE</h3>
<p>米津玄師 x 宇多田ヒカル</p>
</div>
</div>

<div class="card">
<div class="vinyl"><img src="vinyl_cut_2.png"></div>
<div>
<h3>IRIS OUT</h3>
<p>米津玄師</p>
</div>
</div>

<div class="card">
<div class="vinyl"><img src="vinyl_cut_3.png"></div>
<div>
<h3>天空之城</h3>
<p>久石讓</p>
</div>
</div>

<div class="card">
<div class="vinyl"><img src="vinyl_cut_4.png"></div>
<div>
<h3>Celebrity</h3>
<p>IU</p>
</div>
</div>

<div style="text-align:center;">
<a class="button" href="#">🎵 更多作品</a>
</div>

</div>

<footer>
Heartopia Music
</footer>

<script>
/* 星空 */
const p = document.getElementById("particles");

for(let i=0;i<40;i++){
let dot = document.createElement("div");
dot.className="particle";

dot.style.left = Math.random()*100+"vw";
dot.style.animationDuration = (4+Math.random()*6)+"s";
dot.style.animationDelay = Math.random()*5+"s";

p.appendChild(dot);
}

/* 滾動動畫 */
const cards = document.querySelectorAll(".card");

function showCards(){
cards.forEach(c=>{
const top = c.getBoundingClientRect().top;
if(top < window.innerHeight - 100){
c.classList.add("show");
}
});
}

window.addEventListener("scroll", showCards);
showCards();
</script>

</body>
</html>
