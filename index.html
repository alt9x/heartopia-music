<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartopia 唱片展示</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    overflow:hidden;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background: linear-gradient(120deg,#0f172a,#1e293b,#111827,#1e3a8a);
    background-size:400% 400%;
    animation: bgMove 12s ease infinite;
    z-index:-3;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* 星空 */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-2;
    pointer-events:none;
}

.particle{
    position:absolute;
    width:2px;
    height:2px;
    background:rgba(255,255,255,0.6);
    border-radius:50%;
    animation: floatUp linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);opacity:0;}
    20%{opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* 滑鼠光點 */
#cursorGlow{
    position:fixed;
    width:14px;
    height:14px;
    background:rgba(88,101,242,0.8);
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    filter:blur(6px);
    z-index:999;
}

/* header */
header{
    text-align:center;
    padding:50px 20px 20px;
}

h1{
    font-size:32px;
    margin-bottom:8px;
}

.subtitle{
    color:#94a3b8;
    font-size:12px;
}

/* container */
.container{
    max-width:800px;
    margin:auto;
    padding:10px;
}

/* ⭐ GRID（更密） */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(95px, 1fr));
    gap:8px;
    margin-top:15px;
}

/* 卡片（超緊湊） */
.card{
    background:#1e293b;
    border-radius:10px;
    padding:4px;
    text-align:center;
    box-shadow:0 6px 14px rgba(0,0,0,0.25);
    transition:0.2s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* 黑膠（核心：縮小） */
.vinyl-img{
    width:88px;
    height:88px;
    object-fit:cover;
    border-radius:50%;
    display:block;
    margin:4px auto;

    box-shadow:
        0 0 8px rgba(0,0,0,0.6),
        0 0 12px rgba(88,101,242,0.2);

    animation: spin 6s linear infinite;
}

.card:hover .vinyl-img{
    animation: spin 2.5s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* 文字（極小） */
.card h3{
    margin:3px 0 1px 0;
    font-size:10px;
}

.card p{
    margin:0;
    color:#94a3b8;
    font-size:9px;
}

/* 按鈕 */
.button{
    display:inline-block;
    margin-top:20px;
    padding:10px 18px;
    background:#5865F2;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
}

/* 標題 */
.section-title{
    text-align:center;
    font-size:18px;
    margin-top:20px;
}

/* footer */
footer{
    text-align:center;
    margin-top:30px;
    padding:10px;
    color:#64748b;
    font-size:12px;
}
</style>
</head>

<body>

<div id="particles"></div>
<div id="cursorGlow"></div>

<header>
<h1>Heartopia 唱片展示</h1>
<p class="subtitle">玩家自製唱片展示 · 免費分享 · 社群交流</p>
</header>

<div class="container">

<div class="section-title">🎵 作品分享</div>

<div class="grid" id="songGrid"></div>

<div style="text-align:center;">
<a class="button" href="https://discord.gg/ceEKXFwq2m" target="_blank">
🎵 加入 Discord
</a>
</div>

</div>

<footer>
Heartopia 唱片展示
</footer>

<script>

const p = document.getElementById("particles");

for(let i=0;i<80;i++){
let dot = document.createElement("div");
dot.className="particle";
dot.style.left = Math.random()*100+"vw";
dot.style.animationDuration = (3+Math.random()*5)+"s";
dot.style.animationDelay = Math.random()*5+"s";
p.appendChild(dot);
}

const glow = document.getElementById("cursorGlow");

document.addEventListener("mousemove",(e)=>{
glow.style.left = e.clientX+"px";
glow.style.top = e.clientY+"px";
});

const songs = [
  {img:"image.png", title:"JANE DOE", artist:"米津玄師 x 宇多田ヒカル"},
  {img:"image3.png", title:"IRIS OUT", artist:"米津玄師"}
];

const grid = document.getElementById("songGrid");

songs.forEach(song=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="${song.img}" class="vinyl-img">
        <h3>${song.title}</h3>
        <p>${song.artist}</p>
    `;

    grid.appendChild(card);
});

</script>

</body>
</html>
