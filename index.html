<style>

/* ===== 黑膠（真正好看版本） ===== */
.vinyl{
    width:150px;
    height:150px;
    margin:10px auto 14px;
    border-radius:50%;
    position:relative;
    overflow:hidden;
    background:#000;

    /* 黑膠深度感 */
    box-shadow:
        inset 0 0 18px rgba(0,0,0,0.95),
        0 0 8px rgba(0,0,0,0.5);
}

/* 圖片：關鍵修正 */
.vinyl img{
    width:115%;
    height:115%;
    object-fit:cover;

    position:absolute;
    top:-7.5%;
    left:-7.5%;

    animation: spin 10s linear infinite;

    /* ⭐關鍵：柔邊（不要 clip-path） */
    -webkit-mask-image: radial-gradient(circle, white 92%, transparent 100%);
    mask-image: radial-gradient(circle, white 92%, transparent 100%);
}

/* 黑膠紋路 */
.vinyl::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background:
        radial-gradient(circle at center,
            rgba(255,255,255,0.05) 0%,
            transparent 40%
        ),
        repeating-radial-gradient(
            circle,
            rgba(255,255,255,0.04) 0px,
            rgba(255,255,255,0.04) 1px,
            transparent 1px,
            transparent 3px
        );
    pointer-events:none;
}

/* 旋轉 */
@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

</style>
