<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartopia 唱片展示</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    overflow-x:hidden;
}

/* 背景動畫 */
body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background: linear-gradient(120deg,#0f172a,#1e293b,#111827,#1e3a8a);
    background-size:400% 400%;
    animation: bgMove 12s ease infinite;
    z-index:-3;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* 星空 */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-2;
    pointer-events:none;
}

.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:rgba(255,255,255,0.8);
    border-radius:50%;
    animation: floatUp linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);opacity:0;}
    20%{opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* 滑鼠光點 */
#cursorGlow{
    position:fixed;
    width:20px;
    height:20px;
    background:rgba(88,101,242,0.8);
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    filter:blur(6px);
    z-index:999;
}

/* header */
header{
    text-align:center;
    padding:60px 20px 30px;
}

h1{
    font-size:42px;
    margin-bottom:10px;
}

.subtitle{
    color:#94a3b8;
}

/* container */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* grid */
.grid{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:30px;
}

/* 卡片（桌機） */
.card{
    background:#1e293b;
    border-radius:16px;
    padding:10px;
    text-align:center;

    width:180px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);

    animation: cardFloat 6s ease-in-out infinite;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

@keyframes cardFloat{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-3px);}
    100%{transform:translateY(0px);}
}

/* 黑膠 */
.vinyl-img{
    width:150px;
    height:150px;
    object-fit:cover;
    border-radius:50%;
    display:block;
    margin:8px auto;

    box-shadow:
        0 0 12px rgba(0,0,0,0.8),
        0 0 18px rgba(88,101,242,0.25);

    animation: spin 6s linear infinite;
}

.card:hover .vinyl-img{
    animation: spin 2.2s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* 文字 */
.card h3{
    margin:6px 0 2px 0;
    font-size:13px;
}

.card p{
    margin:0;
    color:#94a3b8;
    font-size:11px;
}

/* 按鈕 */
.button{
    display:inline-block;
    margin-top:40px;
    padding:15px 30px;
    background:#5865F2;
    color:white;
    border-radius:12px;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}

.button:hover{
    background:#4752c4;
    transform:scale(1.05);
}

/* 標題 */
.section-title{
    text-align:center;
    font-size:24px;
    margin-top:40px;
}

/* footer */
footer{
    text-align:center;
    margin-top:60px;
    padding:20px;
    color:#64748b;
    font-size:14px;
}

/* ===================== */
/* 📱 手機 RWD（重點） */
/* ===================== */
@media (max-width:768px){

header{
    padding:40px 10px 20px;
}

h1{
    font-size:28px;
}

.subtitle{
    font-size:14px;
}

.grid{
    gap:12px;
}

/* 卡片自動縮放 */
.card{
    width:42vw;
    padding:8px;
}

/* 黑膠縮小 */
.vinyl-img{
    width:100px;
    height:100px;
}

/* 字縮小 */
.card h3{
    font-size:11px;
}

.card p{
    font-size:10px;
}

/* 按鈕 */
.button{
    font-size:16px;
    padding:12px 20px;
}

/* 關掉滑鼠特效 */
#cursorGlow{
    display:none;
}

}

</style>
</head>

<body>

<div id="particles"></div>
<div id="cursorGlow"></div>

<header>
<h1>Heartopia 唱片展示</h1>
<p class="subtitle">玩家自製唱片展示 · 免費分享 · 社群交流</p>
</header>

<div class="container">

<div class="section-title">🎵 作品分享</div>

<div class="grid">

<div class="card">
<img src="image.png" class="vinyl-img">
<h3>JANE DOE</h3>
<p>米津玄師 x 宇多田ヒカル</p>
</div>

<div class="card">
<img src="image3.png" class="vinyl-img">
<h3>IRIS OUT</h3>
<p>米津玄師</p>
</div>

</div>

<div style="text-align:center;">
<a class="button" href="https://discord.gg/ceEKXFwq2m" target="_blank">
🎵 加入 Discord 許願唱片
</a>
</div>

</div>

<footer>
Heartopia 唱片展示
</footer>

<script>
const p = document.getElementById("particles");

for(let i=0;i<60;i++){
let dot = document.createElement("div");
dot.className="particle";

dot.style.left = Math.random()*100+"vw";
dot.style.animationDuration = (3+Math.random()*5)+"s";
dot.style.animationDelay = Math.random()*5+"s";

p.appendChild(dot);
}

const glow = document.getElementById("cursorGlow");

document.addEventListener("mousemove",(e)=>{
glow.style.left = e.clientX+"px";
glow.style.top = e.clientY+"px";
});

/* 手機關閉光點 */
if(window.innerWidth < 768){
document.getElementById("cursorGlow").style.display="none";
}
</script>

</body>
</html>
